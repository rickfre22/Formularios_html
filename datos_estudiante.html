<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datos del Estudiante</title>
</head>
<body>
    <!--Esta es la seccion visible de la pagina web-->
    <h1>REGISTRO DEL ESTUDIANTE-ESPECIALIDAD EN SISTEMAS 2026</h1>
    <!--formulario web-->
    <form action="#" method="=">
        <!--seccion de datos del estudiante-->
        <fieldset>
            <legend>Datos del estudiante</legend>
            <label for="apellido">Apellido:</label>
            <input type="text"id="apellido" name="apellido">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre">      
            <br>
            <label for="fecha_nacimiento">Fecha de nacimiento:</label>
            <input type="date" id="fecha_nacimiento" name="fecha_nacimiento">      
            <label for="lugar_nacimiento">Lugar de nacimiento:</label>
            <input type="text" id="lugar_nacimiento" name="lugar_nacimiento">
            <label for="edad">Edad:</label>
            <input type="number" id="edad" name="edad">
            <br>
            <label for="tipo_documento">Tipo de documento:
                <select name="cc" id="cc">
                    <option value="cc">Cédula de ciudadanía</option>
                    <option value="ti">Tarjeta de identidad</option>
                </select>
            </label for="numero_documento">Número de documento:</label>
            <input type="number" id="numero_documento" name="numero_documento">
            <br>
            <label for="lugar_expedicion_documento">Lugar de expedición del documento:</label>
            <input type="text" id="lugar_expedicion_documento" name="lugar_expedicion_documento">
            <label for="direccion">Dirección:</label>
            <input type="text" id="direccion" name="direccion">
            <label for="barrio">Barrio:</label>
            <input type="text" id="barrio" name="barrio">
            <label for="ciudad">Ciudad:</label>
            <input type="text" id="ciudad" name="ciudad">
            <br>
            <label for="telefono">Teléfono:</label>
            <input type="number" id="telefono" name="telefono">
            <label for="celular">Celular:</label>
            <input type="number" id="celular" name="celular">
            <br>
            <label for="correo_personal">Correo personal:</label>
            <input type="email" id="correo_personal" name="correo_personal">
            <label for="correo_institucional">Correo institucional:</label>
            <input type="email" id="correo_institucional" name="correo_institucional">
            <br>
            <label for="tipo_sangre">Tipo de sangre:</label>
            <input type="text" id="tipo_sangre" name="tipo_sangre">
            <label for="eps">EPS:</label>
            <input type="text" id="eps" name="eps">
            <label for="sufre_enfermedad">Sufre de alguna enfermedad:
                <select name="sufre_enfermedad" id="sufre_enfermedad">
                    <option value="si">Sí</option>
                    <option value="no">No</option>
                </select>
            <label for="enfermedad">¿cuál?</label>
            <input type="text" id="enfermedad" name="enfermedad">
            <br>
            <label for="estrato socioeconómico">Estrato socioeconómico:</label>
            <input type="text" id="estrato socioeconómico" name="estrato socioeconómico">
            <label for="familias en acción">Familias en acción:</label>
            <input type="radio" id="familias en acción" name="familias en acción" value="si">
            <label for="familias en acción">Sí</label>
            <input type="radio" id="familias en acción" name="familias en acción" value="no">
            <label for="familias en acción">No</label>
            <br>
            <label for="religion">Religión:</label>
            <input type="text" id="religion" name="religion">
            <br>
            <label for="relacion_padres">Relación con los padres:
                <select name="casados" id="casados">
                    <option value="casados">Casados</option>
                    <option value="divorciados">Divorciados</option>
                    <option value="union libre">Unión libre</option>
                    <option value="otros">Otros 
                    </select>
            <label for="computadora en clase">Computadora en casa:</label>
            <input type="radio" id="computadora en casa" name="computadora en casa" value="si">
            <label for="computadora en casa">Sí</label>
            <input type="radio" id="computadora en casa" name="computadora en casa" value="no">
            <label for="computadora en casa">No</label>
            <label for="internet en casa">Internet en casa:</label>
            <input type="radio" id="internet en casa" name="internet en casa" value="si">
            <label for="internet en casa">Sí</label>
            <input type="radio" id="internet en casa" name="internet en casa" value="no">
            <label for="internet en casa">No</label>
            <br>
            <label for="hobbies">¿cuales son las activiades que reliaza en su tiempo libre?</label>
            <input type="text" id="hobbies" name="hobbies"> 
            <br>
            <label for="expectativas de area">¿cuales son sus propositos y expectatidas personales y academicaas como estudiante de sistemas?</label>
            <input type="text" id="expectativas de area" name="expectativas de area">

        </fieldset>
        <br>
        <fieldset>
            <legend>DATOS DEL PADRE</legend>

            <label for="apellido">Apellido</label>
            <input type="text" name="apellido" id="apellido padre">

            <label for="nombre">Nombre</label>
            <input type="text" name="nombre" id="nombre padre">
            <br>
            <label for="dirrecion">Dirreción</label>
            <input type="text" name="dirrecion" id="dirrecion padre">
            <label for="barrio">Barrio</label>
            <input type="text" name="Barrio" id="Barrio padre">
            <br>
            <label for="telefono">Telefono</label>
            <input type="number" name="telefono" id="telefono padre">
            <label for="celular">Celular</label>
            <input type="number" name="celular" id="celular padre">
            <br>
            <label for="email">Email</label>
            <input type="email" name="email" id="email padre">
            <br>
            <label for="ocupacion">Ocupacion</label>
            <input type="text" name="ocupacion" id="ocupacion padre">
        </fieldset>
        <br>
        <fieldset>
            <legend>DATOS DE LA MADRE</legend>
        
        
            <label for="apellido">Apellido</label>
            <input type="text" name="apellido" id="apellido madre">

            <label for="nombre">Nombre</label>
            <input type="text" name="nombre" id="nombre madre">
            <br>
            <label for="dirrecion">Dirreción</label>
            <input type="text" name="dirrecion" id="dirrecion madre">
            <label for="barrio">Barrio</label>
            <input type="text" name="Barrio" id="Barrio madre">
            <br>
            <label for="telefono">Telefono</label>
            <input type="number" name="telefono" id="telefono madre">
            <label for="celular">Celular</label>
            <input type="number" name="celular" id="celular madre">
            <br>
            <label for="email">Email</label>
            <input type="email" name="email" id="email madre">
            <br>
            <label for="ocupacion">Ocupacion</label>
            <input type="text" name="ocupacion" id="ocupacion madre">
        </fieldset>
        <br>
        <fieldset>
            <legend>DATOS DEL ACUDIENTE</legend>

            <label for="apellido">Apellido</label>
            <input type="text" name="apellido" id="apellido acudiente">

            <label for="nombre">Nombre</label>
            <input type="text" name="nombre" id="nombre acudiente">
            <br>
            <label for="dirrecion">Dirreción</label>
            <input type="text" name="dirrecion" id="dirrecion acudiente">
            <label for="barrio">Barrio</label>
            <input type="text" name="Barrio" id="Barrio acudiente">
            <br>
            <label for="telefono">Telefono</label>
            <input type="number" name="telefono" id="telefono acudiente">
            <label for="celular">Celular</label>
            <input type="number" name="celular" id="celular acudiente">
            <br>
            <label for="email">Email</label>
            <input type="email" name="email" id="email acudiente">
            <br>
            <label for="ocupacion">Ocupacion</label>
            <input type="text" name="ocupacion" id="ocupacion acudiente">
        </fieldset>
        <button type="submit">Enviar formulario</button>
        <button type="reset">Limpiar formulario</button>

    </form>
</body>
</html>
